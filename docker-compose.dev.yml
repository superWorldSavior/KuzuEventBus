version: "3.8"

services:
  # PostgreSQL - Application metadata
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kuzu_eventbus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"  # Host:5433 → Container:5432 (localhost only, sécurité)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuzu_user -d kuzu_eventbus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache, Sessions, Queues
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # Host:6380 → Container:6379 (évite conflit)
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO - S3-compatible storage for Kuzu DBs
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000" # API (Host:9100 → Container:9000)
      - "9101:9001" # Console (Host:9101 → Container:9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3


  # Redis Insight - Redis interface (dev only)
  redis-insight:
    image: redislabs/redisinsight:latest
    ports:
      - "8101:5540"  # Host:8101 → Container:5540
    volumes:
      - redis_insight_data:/db
    depends_on:
      - redis

  # API - FastAPI server with HOT RELOAD
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      KUZU_DATA_DIR: /data/kuzu
      # Postgres DSN for SQLAlchemy
      DATABASE_URL: postgresql+psycopg2://kuzu_user:kuzu_password@postgres:5432/kuzu_eventbus
      # Redis URL for async clients
      REDIS_URL: redis://redis:6379/0
      # MinIO configuration
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: kuzu-databases
      MINIO_SECURE: "false"
      # Graph engine selection and endpoint (feature-flag)
      GRAPH_ENGINE: ${GRAPH_ENGINE:-kuzu}
      ENGINE_ENDPOINT: ${ENGINE_ENDPOINT:-http://engine:9400}
      # Hot reload configuration
      PYTHONPATH: /app
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8200:8000"  # Host:8200 → Container:8000 (évite conflit)
    volumes:
      # Mount source code for hot reload
      - ./backend:/app:cached
      - kuzu_data:/data/kuzu
      # Exclude these directories from mounting to avoid conflicts
      - /app/__pycache__
      - /app/.pytest_cache
      - /app/src/__pycache__
    # Enable hot reload with uvicorn
    command:
      [
        "uvicorn",
        "src.presentation.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/src",
        "--reload-delay",
        "0.25",
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Worker - Async query processor with HOT RELOAD
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      KUZU_DATA_DIR: /data/kuzu
      DATABASE_URL: postgresql+psycopg2://kuzu_user:kuzu_password@postgres:5432/kuzu_eventbus
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: kuzu-databases
      MINIO_SECURE: "false"
      PYTHONPATH: /app
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      # Mount source code for hot reload
      - ./backend:/app:cached
      - kuzu_data:/data/kuzu
      # Exclude cache directories
      - /app/__pycache__
      - /app/.pytest_cache
      - /app/src/__pycache__
    # Use watchfiles to monitor and restart worker on changes
    command:
      [
        "python",
        "-m",
        "watchfiles",
        "python scripts/run_query_worker.py",
        "/app/src",
        "--ignore-paths",
        "__pycache__",
        "--ignore-paths",
        "*.pyc",
      ]

  # Frontend - React with Vite HOT RELOAD
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - api
    ports:
      - "3100:3000"  # Host:3100 → Container:3000 (évite conflit)
      - "3101:3101" # Vite HMR port (même port des deux côtés)
    environment:
      NODE_ENV: development
      # No VITE_API_URL - let Vite proxy handle /api -> backend
      VITE_ENABLE_SSE: "true"
      # Vite HMR configuration for Docker
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 3101
      VITE_HOST: 0.0.0.0
      VITE_PORT: 3000
      # Enable polling for file changes in Docker
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 1000
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app:cached
      - /app/node_modules # Avoid mounting node_modules
      - /app/dist # Avoid mounting dist directory
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Engine - Rust ISO GQL skeleton service
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    environment:
      ENGINE_PORT: 9400
    ports:
      - "9400:9400"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9400/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  redis_insight_data:
  kuzu_data:

networks:
  default:
    name: kuzu_eventbus_dev_network
