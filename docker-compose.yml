version: "3.8"

services:
  # PostgreSQL - Métadonnées de l'application
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kuzu_eventbus
      POSTGRES_USER: kuzu_user
      POSTGRES_PASSWORD: kuzu_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuzu_user -d kuzu_eventbus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache, Sessions, Queues
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO - Stockage S3-compatible pour les DBs Kuzu
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Adminer - Interface pour PostgreSQL (dev only)
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # Redis Insight - Interface pour Redis (dev only)
  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "8001:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      - redis

  # API - FastAPI server
  api:
    build: .
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      ENVIRONMENT: development
      KUZU_DATA_DIR: /data/kuzu
      # Postgres DSN for SQLAlchemy
      DATABASE_URL: postgresql+psycopg2://kuzu_user:kuzu_password@postgres:5432/kuzu_eventbus
      # Redis URL for async clients
      REDIS_URL: redis://redis:6379/0
      # MinIO configuration
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: kuzu-databases
      MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - kuzu_data:/data/kuzu

  # Worker - Async query processor (Redis Streams)
  worker:
    build: .
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      ENVIRONMENT: development
      KUZU_DATA_DIR: /data/kuzu
      DATABASE_URL: postgresql+psycopg2://kuzu_user:kuzu_password@postgres:5432/kuzu_eventbus
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: kuzu-databases
      MINIO_SECURE: "false"
    command: ["python", "backend/scripts/run_query_worker.py"]
    volumes:
      - ./backend:/app/backend
      - kuzu_data:/data/kuzu

  # Frontend - React with Vite (TypeScript)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  redis_insight_data:
  kuzu_data:

networks:
  default:
    name: kuzu_eventbus_network
